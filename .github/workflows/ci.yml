name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check (biome via ultracite)
        run: pnpm run check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test with coverage (unit only — skip integration)
        run: pnpm run test:coverage 2>&1 | tee coverage-output.txt

      - name: Coverage summary
        if: always()
        run: |
          echo '## Coverage Report' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -A 20 '% Coverage report' coverage-output.txt >> "$GITHUB_STEP_SUMMARY" || echo 'No coverage data' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # The offline metric gate is the deterministic golden-file vitest test above
      # (src/bench/__tests__/golden.test.ts). This step only renders the same
      # deterministic table into the run summary, so it is best-effort.
      - name: Offline provider metrics (best-effort)
        if: always()
        continue-on-error: true
        run: |
          pnpm --filter @minpeter/opensearch bench:offline -- --markdown bench-offline.md
          echo '' >> "$GITHUB_STEP_SUMMARY"
          cat packages/opensearch/bench-offline.md >> "$GITHUB_STEP_SUMMARY" || echo 'No offline metrics' >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
